global
    maxconn 100

defaults
    mode    http
    timeout connect 5s
    timeout client  50s
    timeout server  50s

listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s

frontend http_in
    bind *:8080
    default_backend nginx_backend

backend nginx_backend
    server web1 web:80 check

